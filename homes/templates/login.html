{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - KejaHomes</title>
    <link href="{% static 'assets/img/favicon//property.png' %}" rel="icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .register-form { display: none; } /* hidden by default */
        .toggle-link { cursor: pointer; color: #0d6efd; text-decoration: underline; }
    </style>
</head>
<body>
<div class="container mt-5" style="max-width: 500px;">
    <h2 class="text-center mb-4">KejaHomes</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <!-- LOGIN FORM -->
    <div class="card mb-3 shadow-sm">
        <div class="card-body">
            <h4 class="mb-3">Login</h4>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" name="username" id="username" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" name="password" id="password" class="form-control" required>
                </div>

                <button type="submit" name="login" class="btn btn-success w-100">Login</button>
            </form>

          <p class="mt-3 text-center">
    Don't have an account?
    <a href="{% url 'register' %}">Register here</a>
</p>
        </div>
    </div>

    <!-- REGISTRATION FORM -->
    <div class="card shadow-sm register-form" id="registerForm">
        <div class="card-body">
            <h4 class="mb-3">Register</h4>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="reg_username" class="form-label">Username</label>
                    <input type="text" name="reg_username" id="reg_username" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="reg_email" class="form-label">Email</label>
                    <input type="email" name="reg_email" id="reg_email" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="reg_password1" class="form-label">Password</label>
                    <input type="password" name="reg_password1" id="reg_password1" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="reg_password2" class="form-label">Confirm Password</label>
                    <input type="password" name="reg_password2" id="reg_password2" class="form-control" required>
                </div>

                <button type="submit" name="register" class="btn btn-primary w-100">Register</button>

                <p class="mt-3 text-center">
                    Already have an account?
                    <span class="toggle-link" onclick="document.getElementById('registerForm').style.display='none'; document.querySelector('.toggle-link').style.display='inline';">
                        Login here
                    </span>
                </p>
            </form>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
